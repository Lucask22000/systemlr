<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
<title id="title">Fluxo de estoque</title>
<desc id="desc">Cadastrar base, receber, movimentar e acompanhar indicadores de estoque.</desc>
<rect width="1200" height="320" fill="#f4f7fb"/>
<text x="40" y="42" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Fluxo operacional de estoque</text>
<g font-family="Arial, sans-serif">
<rect x="30" y="90" width="250" height="160" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
<text x="55" y="126" font-size="20" font-weight="700" fill="#0f172a">1. Cadastrar base</text>
<text x="55" y="156" font-size="16" fill="#475569">Fornecedor,</text>
<text x="55" y="178" font-size="16" fill="#475569">categoria e produto</text>
<rect x="325" y="90" width="250" height="160" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
<text x="350" y="126" font-size="20" font-weight="700" fill="#0f172a">2. Receber ou ajustar</text>
<text x="350" y="156" font-size="16" fill="#475569">Entrada, saida</text>
<text x="350" y="178" font-size="16" fill="#475569">ou transferencia</text>
<rect x="620" y="90" width="250" height="160" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
<text x="645" y="126" font-size="20" font-weight="700" fill="#0f172a">3. Armazenar</text>
<text x="645" y="156" font-size="16" fill="#475569">Endereco, picking</text>
<text x="645" y="178" font-size="16" fill="#475569">e reposicao</text>
<rect x="915" y="90" width="250" height="160" rx="18" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
<text x="940" y="126" font-size="20" font-weight="700" fill="#166534">4. Monitorar</text>
<text x="940" y="156" font-size="16" fill="#166534">Relatorios, giro</text>
<text x="940" y="178" font-size="16" fill="#166534">e ruptura</text>
<path d="M280 170 H325" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
<path d="M575 170 H620" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
<path d="M870 170 H915" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
</g>
</svg>
