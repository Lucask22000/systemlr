<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
<title id="title">Fluxo de acesso e navegacao</title>
<desc id="desc">Verificar usuario, perfil, permissao e sessao para diagnosticar bloqueios.</desc>
<rect width="1200" height="320" fill="#f4f7fb"/>
<text x="40" y="42" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Diagnostico de acesso e navegacao</text>
<g font-family="Arial, sans-serif">
<rect x="30" y="90" width="250" height="160" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
<text x="55" y="126" font-size="20" font-weight="700" fill="#0f172a">1. Usuario ativo?</text>
<text x="55" y="156" font-size="16" fill="#475569">Validar cadastro,</text>
<text x="55" y="178" font-size="16" fill="#475569">senha e matricula</text>
<rect x="325" y="90" width="250" height="160" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
<text x="350" y="126" font-size="20" font-weight="700" fill="#0f172a">2. Perfil correto?</text>
<text x="350" y="156" font-size="16" fill="#475569">Cargo e funcao</text>
<text x="350" y="178" font-size="16" fill="#475569">batem com a rotina</text>
<rect x="620" y="90" width="250" height="160" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
<text x="645" y="126" font-size="20" font-weight="700" fill="#0f172a">3. Pagina liberada?</text>
<text x="645" y="156" font-size="16" fill="#475569">Revisar acessos</text>
<text x="645" y="178" font-size="16" fill="#475569">por pagina</text>
<rect x="915" y="90" width="250" height="160" rx="18" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<text x="940" y="126" font-size="20" font-weight="700" fill="#1d4ed8">4. Reentrar</text>
<text x="940" y="156" font-size="16" fill="#1d4ed8">Atualizar sessao</text>
<text x="940" y="178" font-size="16" fill="#1d4ed8">apos ajustes</text>
<path d="M280 170 H325" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
<path d="M575 170 H620" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
<path d="M870 170 H915" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
</g>
</svg>
