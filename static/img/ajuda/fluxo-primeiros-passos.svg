<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
<title id="title">Fluxo de primeiros passos</title>
<desc id="desc">Configurar acessos, empresa, catalogo e validar operacao em teste.</desc>
<rect width="1200" height="320" fill="#f4f7fb"/>
<text x="40" y="42" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Primeiros passos no sistema</text>
<g font-family="Arial, sans-serif">
<rect x="30" y="90" width="250" height="160" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
<text x="55" y="126" font-size="20" font-weight="700" fill="#0f172a">1. Revisar acessos</text>
<text x="55" y="156" font-size="16" fill="#475569">Cargos, usuarios</text>
<text x="55" y="178" font-size="16" fill="#475569">e permissoes</text>
<rect x="325" y="90" width="250" height="160" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
<text x="350" y="126" font-size="20" font-weight="700" fill="#0f172a">2. Configurar empresa</text>
<text x="350" y="156" font-size="16" fill="#475569">Tipo de negocio,</text>
<text x="350" y="178" font-size="16" fill="#475569">canais e recursos</text>
<rect x="620" y="90" width="250" height="160" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
<text x="645" y="126" font-size="20" font-weight="700" fill="#0f172a">3. Montar catalogo</text>
<text x="645" y="156" font-size="16" fill="#475569">Categorias, produtos</text>
<text x="645" y="178" font-size="16" fill="#475569">e estoque inicial</text>
<rect x="915" y="90" width="250" height="160" rx="18" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
<text x="940" y="126" font-size="20" font-weight="700" fill="#166534">4. Testar operacao</text>
<text x="940" y="156" font-size="16" fill="#166534">Abrir caixa e validar</text>
<text x="940" y="178" font-size="16" fill="#166534">fluxo completo</text>
<path d="M280 170 H325" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
<path d="M575 170 H620" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
<path d="M870 170 H915" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
</g>
</svg>
