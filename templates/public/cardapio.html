<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardapio - Mesa {{ mesa.numero }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="public-menu">
    <div class="container narrow">
        <h1>Cardapio - Mesa {{ mesa.numero }}</h1>
        <p class="text-muted">Selecione os itens e envie seu pedido. Nao e necessario login.</p>
        <form method="POST" action="{{ url_for('public.enviar_pedido_qr', token=mesa.qr_token) }}">
            <div class="grid">
                {% for produto in produtos %}
                <div class="card card-product-menu">
                    {% if produto.imagem_path %}
                    <img src="{{ url_for('static', filename=produto.imagem_path) }}" alt="{{ produto.nome }}" class="menu-product-image">
                    {% endif %}
                    <div class="card-body">
                        <h3>{{ produto.nome }}</h3>
                        <p class="text-muted">{{ produto.descricao }}</p>
                        <p><strong>R$ {{ '%.2f'|format(produto.preco_venda) }}</strong></p>
                        <label>Quantidade</label>
                        <input type="number" name="produto_{{ produto.id }}" min="0" max="20" value="0" class="form-control">
                    </div>
                </div>
                {% endfor %}
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="margin-top:16px;">Enviar pedido</button>
        </form>
    </div>
</body>
</html>
