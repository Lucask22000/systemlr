{% extends "base.html" %}

{% block title %}Novo Endereco de Estoque - SystemLR{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Novo Endereco de Estoque</h1>
</div>

<div class="form-container">
    <form method="POST" class="form">
        <div class="form-group">
            <label for="nome">Nome *</label>
            <input type="text" id="nome" name="nome" class="input-text" required maxlength="120" placeholder="Ex: Deposito Central, Loja Frente">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="rua">Rua</label>
                <input type="text" id="rua" name="rua" class="input-text" maxlength="160">
            </div>
            <div class="form-group">
                <label for="numero">Numero</label>
                <input type="text" id="numero" name="numero" class="input-text" maxlength="20">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="bairro">Bairro</label>
                <input type="text" id="bairro" name="bairro" class="input-text" maxlength="100">
            </div>
            <div class="form-group">
                <label for="complemento">Complemento</label>
                <input type="text" id="complemento" name="complemento" class="input-text" maxlength="120">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="cidade">Cidade</label>
                <input type="text" id="cidade" name="cidade" class="input-text" maxlength="100">
            </div>
            <div class="form-group">
                <label for="estado">UF</label>
                <input type="text" id="estado" name="estado" class="input-text" maxlength="2" placeholder="SP">
            </div>
            <div class="form-group">
                <label for="cep">CEP</label>
                <input type="text" id="cep" name="cep" class="input-text" maxlength="12">
            </div>
        </div>

        <div class="form-group">
            <label class="checkbox-inline">
                <input type="checkbox" name="ativo" checked>
                Endereco ativo
            </label>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Salvar Endereco</button>
            <a href="{{ url_for('listar_enderecos_estoque') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
