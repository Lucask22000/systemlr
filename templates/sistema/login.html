<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>Login - SystemLR</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/core/app-theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/auth.css') }}">
</head>
<body class="auth-body">
    <div class="auth-card auth-card-login">
        <div class="auth-header">
            <div class="auth-logo" aria-hidden="true">SL</div>
            <div>
                <h1 class="auth-title" id="login-title">Entrar no sistema</h1>
                <p class="auth-subtitle">Use seu email e senha para continuar.</p>
            </div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="auth-alerts">
                    {% for category, message in messages %}
                        <div class="auth-alert {{ 'danger' if category == 'danger' else category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        
        <form class="auth-form" method="POST" action="{{ url_for('login') }}">
            {{ csrf_input|safe }}
            <div class="auth-field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autofocus>
            </div>
            
            <div class="auth-field">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" required>
            </div>
            
            <div class="auth-actions">
                <button type="submit" class="auth-btn">Entrar</button>
            </div>
        </form>
        
        <div class="auth-footer">
            Primeira vez aqui? <a href="{{ url_for('registro') }}">Criar conta</a>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/csrf.js') }}"></script>
</body>
</html>
