{% extends "base.html" %}

{% block title %}Erro 403 - SystemLR{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-code">403</div>
    <h1>Acesso negado</h1>
    <p>{{ error_message if error_message else 'Você não tem permissão para acessar este recurso.' }}</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">Voltar para Home</a>
</div>
{% endblock %}
